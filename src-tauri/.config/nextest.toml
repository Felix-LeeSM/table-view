[profile.default]
retries = 0
fail-fast = true
failure-output = "immediate-final"
success-output = "never"
status-level = "pass"
final-status-level = "fail"
slow-timeout = { period = "60s", terminate-after = 3 }

[profile.push]
inherits = "default"
fail-fast = false
failure-output = "immediate-final"
success-output = "never"
status-level = "slow"
final-status-level = "fail"
slow-timeout = { period = "60s", terminate-after = 4 }

[profile.ci]
inherits = "push"
status-level = "all"
final-status-level = "slow"
