services:
  postgres:
    image: postgres:16-alpine
    container_name: table_view_postgres
    environment:
      # default `testuser`/`testpass` — 같은 한 쌍을 CI workflow,
      # `src-tauri/tests/common/mod.rs` 통합 테스트, smoke e2e UI 폼,
      # `scripts/wait-for-test-db.sh`, Mongo 서비스가 모두 사용한다.
      POSTGRES_USER: ${PGUSER:-testuser}
      POSTGRES_PASSWORD: ${PGPASSWORD:-testpass}
      POSTGRES_DB: ${PGDATABASE:-table_view_test}
    # Host port binding — non-default by design (ADR 0019 follow-up,
    # 2026-05-01). Host devs frequently run another Postgres on :5432
    # (Postgres.app, brew, app project DBs) and the collision blocks the
    # smoke runner every time. We bind the test container to **15432** by
    # default (`prod default + 10000`); override with `PGPORT=...` when a
    # specific shard / parallel run needs a different port.
    ports:
      - "${PGPORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PGUSER:-testuser} -d ${PGDATABASE:-table_view_test}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  mysql:
    # Sprint 250 — MySQL seed infrastructure for Phase 17 (Sprint 251-256
    # MySQL adapter). Mirrors the postgres/mongo pattern: testuser/testpass
    # credentials shared across CI workflow, src-tauri integration helpers,
    # e2e form fixtures, scripts/db/wait.sh, and scripts/fixtures/mysql.ts.
    image: mysql:8.0
    container_name: table_view_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-testroot}
      MYSQL_USER: ${MYSQL_USER:-testuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-testpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-table_view_test}
    # Host port binding — same `prod default + 10000` rule as postgres
    # (15432) and mongo (37017): bind to **13306** so a host mysqld on
    # :3306 (brew, docker desktop's bundled, app project DBs) doesn't
    # clobber local test runs. Override with `MYSQL_PORT=...` for shards.
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      # `mysqladmin ping` needs root credentials inside the container.
      # `$$` escapes the literal `$` so docker-compose doesn't try to
      # variable-substitute MYSQL_ROOT_PASSWORD at compose-parse time.
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  mongo:
    image: mongo:7
    container_name: table_view_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-testuser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-testpass}
    # Host port binding — same `prod default + 10000` rule (ADR 0019
    # follow-up): bind to **37017** so a host mongod on :27017 doesn't
    # clobber the smoke runner. Override with `MONGO_PORT=...` to pick a
    # different port.
    ports:
      - "${MONGO_PORT:-37017}:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  mariadb:
    image: mariadb:11
    container_name: table_view_mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-testroot}
      MARIADB_USER: ${MARIADB_USER:-testuser}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-testpass}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-table_view_test}
    ports:
      - "${MARIADB_PORT:-23306}:3306"
    volumes:
      - mariadbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: table_view_mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_PASSWORD:-Testpass123!}
    ports:
      - "${MSSQL_PORT:-14333}:1433"
    volumes:
      - mssqldata:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q ''SELECT 1'' || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  oracle:
    image: gvenzl/oracle-xe:21
    container_name: table_view_oracle
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-testpass}
      APP_USER: ${ORACLE_USER:-testuser}
      APP_USER_PASSWORD: ${ORACLE_PASSWORD:-testpass}
    ports:
      - "${ORACLE_PORT:-1521}:1521"
    volumes:
      - oracledata:/opt/oracle/oradata
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'SELECT 1 FROM DUAL;' | sqlplus -s '${ORACLE_USER:-testuser}/${ORACLE_PASSWORD:-testpass}@localhost:1521/${ORACLE_SERVICE:-XEPDB1}' | grep -q '1'",
        ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: table_view_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  mongodata:
  mysqldata:
  mariadbdata:
  mssqldata:
  oracledata:
