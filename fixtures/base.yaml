# Fixture base spec — entity shape (shared across profiles).
# See docs/fixture-data-workflow-handoff.md for the full contract.
#
# Profiles override `seed`, `locale_mix`, and per-entity row counts.
# Defaults: nullable=false, unique=false, primary=false. PK auto-implies
# nullable=false + unique=true and is never edge-injected.

entities:
  customers:
    targets: [pg, mongo, mysql, sqlite, duckdb, mariadb, mssql, oracle, redis]
    pg: { schema: core, table: customers }
    mongo: { collection: core_customers }
    mysql: { table: customers }
    sqlite: { table: customers }
    duckdb: { schema: core, table: customers }
    mariadb: { table: customers }
    mssql: { schema: dbo, table: customers }
    oracle: { table: customers }
    redis: { key_prefix: "customer" }
    columns:
      id: { type: uuid, primary: true }
      email: { type: email, unique: true }
      full_name: { type: full_name, locale_aware: true, max_length: 200 }
      phone: { type: phone, nullable: true, max_length: 64 }
      created_at: { type: timestamp, range: [-365d, 0d] }

  products:
    targets: [pg, mongo, mysql, sqlite, duckdb, mariadb, mssql, oracle, redis]
    pg: { schema: catalog, table: products }
    mongo: { collection: catalog_products }
    mysql: { table: products }
    sqlite: { table: products }
    duckdb: { schema: catalog, table: products }
    mariadb: { table: products }
    mssql: { schema: dbo, table: products }
    oracle: { table: products }
    redis: { key_prefix: "product" }
    columns:
      id: { type: uuid, primary: true }
      sku: { type: sku, unique: true }
      name: { type: product_name, locale_aware: true, max_length: 200 }
      price: { type: decimal, range: [0.99, 999.99] }
      tags: { type: array_of, item: string, count: [0, 4] }

  orders:
    targets: [pg, mongo, mysql, sqlite, duckdb, mariadb, mssql, oracle, redis]
    pg: { schema: sales, table: orders }
    mongo:
      collection: sales_orders
      embed:
        items: { from: order_items, kind: many }
    mysql: { table: orders }
    sqlite: { table: orders }
    duckdb: { schema: sales, table: orders }
    mariadb: { table: orders }
    mssql: { schema: dbo, table: orders }
    oracle: { table: orders }
    redis: { key_prefix: "order" }
    columns:
      id: { type: uuid, primary: true }
      customer_id: { type: ref, to: customers.id }
      ordered_at: { type: timestamp, range: [-90d, 0d] }
      status:
        { type: enum, values: [pending, paid, shipped, delivered, refunded] }
      total: { type: decimal, range: [0.99, 9999.99] }

  order_items:
    targets: [pg, mysql, sqlite, duckdb, mariadb, mssql, oracle]
    # mongo: embedded inside orders.items
    # redis: embedded inside order hash
    pg: { schema: sales, table: order_items }
    mysql: { table: order_items }
    sqlite: { table: order_items }
    duckdb: { schema: sales, table: order_items }
    mariadb: { table: order_items }
    mssql: { schema: dbo, table: order_items }
    oracle: { table: order_items }
    columns:
      id: { type: uuid, primary: true }
      order_id: { type: ref, to: orders.id }
      product_id: { type: ref, to: products.id }
      quantity: { type: int, range: [1, 5] }
      unit_price: { type: decimal, range: [0.99, 999.99] }

  support_tickets:
    targets: [pg, mongo, mysql, sqlite, duckdb, mariadb, mssql, oracle, redis]
    pg: { schema: support, table: tickets }
    mongo: { collection: support_tickets }
    mysql: { table: tickets }
    sqlite: { table: tickets }
    duckdb: { schema: support, table: tickets }
    mariadb: { table: tickets }
    mssql: { schema: dbo, table: tickets }
    oracle: { table: tickets }
    redis: { key_prefix: "ticket" }
    columns:
      id: { type: uuid, primary: true }
      customer_id: { type: ref, to: customers.id, nullable: true }
      subject: { type: text, locale_aware: true, max_length: 200 }
      body: { type: text, locale_aware: true, max_length: 5000, nullable: true }
      status: { type: enum, values: [open, pending, resolved, closed] }
      created_at: { type: timestamp, range: [-180d, 0d] }
