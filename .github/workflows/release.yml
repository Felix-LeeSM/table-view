name: Release

# Trigger policy:
# - tag push (`v*.*.*`): the actual release pipeline. Tag SHA's tauri.conf.json
#   version must match the tag (e.g. tag `v0.2.0` ↔ "version": "0.2.0"). Builds
#   required bundles for macOS arm64 and Windows x86_64, plus the Linux x64
#   automation bundle, and attaches them to
#   a *draft* GitHub Release named after the tag — the maintainer reviews and
#   publishes manually so an accidental tag push doesn't ship to users.
# - `workflow_dispatch`: manual trigger from the Actions UI for dry-runs. Still
#   produces a draft release using the dispatched ref's commit SHA as the tag,
#   so you can rehearse the pipeline without pushing a real version tag.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

# Two release runs on the same tag would race against the same draft release;
# cancel the older one.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Bundle (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            platform: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            cxxflags: ""
          # Pinned to windows-2022 (VS17 / MSVC 14.4x): windows-latest ships VS18
          # (MSVC 14.51), where DuckDB's vendored fmt references
          # stdext::checked_array_iterator and fails with C2653 even under
          # /std:c++17. Matches platform-smoke-canary.yml. Lift the pin only after
          # DuckDB's vendored fmt builds clean on MSVC 14.51.
          - label: Windows x86_64
            platform: windows-2022
            target: x86_64-pc-windows-msvc
            args: ""
            cxxflags: "/std:c++17"
          - label: Linux x64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
            cxxflags: ""

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Linux Tauri bundles depend on webkit2gtk + librsvg + patchelf. macOS &
      # Windows runners come with everything Tauri needs preinstalled (libwebview2
      # on Windows, WKWebView on macOS).
      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            file

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Rust target dir caches across runs of the same matrix leg. Keyed on
      # OS+target so each platform keeps an isolated target tree.
      - name: Cache cargo target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}
          shared-key: release

      - name: Install pnpm deps
        run: pnpm install --frozen-lockfile

      # tauri-action handles: `pnpm tauri build --target …`, parsing the bundle
      # artifacts, creating/updating a GitHub Release, and uploading every
      # bundle output as a release asset. We rely on the .icon Liquid Glass
      # artifacts already committed under src-tauri/icons/Compiled/ so the
      # macOS runner doesn't need actool at release time.
      - name: Build + upload to draft release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CXXFLAGS: ${{ matrix.cxxflags }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.sha) }}
          releaseName: "Table View ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}"
          releaseBody: |
            Multi-platform release bundles produced by `.github/workflows/release.yml`.

            **Install**

            - **macOS**: download the Apple Silicon `.dmg`.
              Unsigned — on first launch right-click → Open, or run
              `xattr -d com.apple.quarantine "/Applications/Table View.app"`.
            - **Windows**: run the `.msi` installer. Unsigned — SmartScreen may
              warn; click "More info" → "Run anyway".
            - **Linux**: `.deb`, `.rpm`, or `.AppImage` — pick the one matching
              your distro.

            **Verify**

            Each bundle has a sibling `.sha256` file. After downloading both:

            ```sh
            # macOS / Linux
            shasum -a 256 -c <file>.dmg.sha256
            # Windows (PowerShell)
            (Get-FileHash <file>.msi -Algorithm SHA256).Hash -eq (Get-Content <file>.msi.sha256).Split()[0]
            ```

            See the commit log for changes.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Regression guard: confirm the macOS bundle carries a proper ad-hoc
      # signature (Sealed Resources). Without it Gatekeeper trashes the app as
      # "damaged" — the bundle ends up only linker-signed (flags 0x20002), which
      # spctl rejects with "code has no resources but signature indicates they
      # must be present". Catch a Tauri signing regression here, not in a user's
      # /Applications.
      - name: Verify macOS bundle signature
        if: matrix.platform == 'macos-14'
        shell: bash
        run: |
          set -e
          APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Table View.app"
          [ -d "$APP" ] || { echo "FAIL: $APP not found"; exit 1; }
          codesign -dv --verbose=4 "$APP" 2>/tmp/cs.txt || { echo "FAIL: codesign"; cat /tmp/cs.txt; exit 1; }
          grep -q "Sealed Resources version=2" /tmp/cs.txt || { echo "FAIL: no Sealed Resources — bundle not signed, would be 'damaged'"; cat /tmp/cs.txt; exit 1; }
          echo "OK: macOS bundle carries Sealed Resources (proper ad-hoc signature)"

      # tauri-action exposes `artifactPaths` — the JSON array of bundles it just
      # uploaded as release assets. We hash each one with sha256 and upload the
      # sidecar `.sha256` file (single-line `<hash>  <filename>` so the standard
      # `shasum -a 256 -c …` checksum verifier works). `shell: bash` on Windows
      # uses Git Bash, which ships `shasum` and `jq`, so this is portable.
      - name: Upload SHA256 checksums
        if: steps.tauri.outputs.artifactPaths != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.sha) }}
        run: |
          set -e
          echo '${{ steps.tauri.outputs.artifactPaths }}' | jq -r '.[]' | while IFS= read -r f; do
            [ -f "$f" ] || continue
            base="$(basename "$f")"
            (cd "$(dirname "$f")" && shasum -a 256 "$base") > "${f}.sha256"
            gh release upload "$TAG" "${f}.sha256" --clobber
          done
