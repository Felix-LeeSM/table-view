name: Homebrew Cask Sync

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to sync (e.g. v0.3.0)"
        required: true
        type: string

jobs:
  publish-cask:
    name: Update Homebrew tap
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v6

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0

      - name: Generate updated cask file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
          HOMEBREW_TAP_PATH: Casks/table-view.rb
          HOMEBREW_TAP_REPO_PATH: ${{ github.workspace }}/homebrew-tap
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          HOMEBREW_CASK_NAME: table-view
          HOMEBREW_APP_NAME: Table View.app
          HOMEBREW_APP_TITLE: Table View
          HOMEBREW_DESCRIPTION: Table View for MongoDB and SQL databases.
          HOMEBREW_HOMEPAGE: https://github.com/${{ github.repository }}
        run: |
          node scripts/release/update-homebrew-cask.mjs

      - name: Open PR in tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          HOMEBREW_TAP_BASE_BRANCH: ${{ vars.HOMEBREW_TAP_BASE_BRANCH || 'main' }}
        working-directory: homebrew-tap
        run: |
          set -euo pipefail

          base_branch="${HOMEBREW_TAP_BASE_BRANCH:-main}"
          version="${RELEASE_TAG#v}"
          branch="chore/table-view-${version}"
          tap_file="Casks/table-view.rb"
          generated_tap_file="$(mktemp)"
          trap 'rm -f "${generated_tap_file:-}"' EXIT
          cp "${tap_file}" "${generated_tap_file}"
          # The cask generator writes directly into this tap checkout working
          # tree. Drop that copy now (generated_tap_file holds the backup) so
          # it does not carry across the branch switch and mask the diff.
          rm -f "${tap_file}"

          if git ls-remote --exit-code --heads origin "${branch}" > /dev/null 2>&1; then
            git fetch --quiet origin "${branch}"
            if git show-ref --verify --quiet "refs/heads/${branch}"; then
              git switch --quiet "${branch}"
              git reset --hard "origin/${branch}"
            else
              git switch --quiet -c "${branch}" --track "origin/${branch}"
            fi
          else
            git switch --quiet -c "${branch}"
          fi

          cp "${generated_tap_file}" "${tap_file}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage before the change check: a first-time cask is untracked, and
          # `git diff --quiet` ignores untracked files. `git diff --cached`
          # after `git add` catches both new and modified cask files.
          git add "${tap_file}"

          if git diff --cached --quiet; then
            echo "No changes for Homebrew cask for ${RELEASE_TAG}."
            if gh pr view --repo "${HOMEBREW_TAP_REPO}" "${branch}" > /dev/null 2>&1; then
              echo "PR already exists for ${branch}."
            else
              echo "No PR exists for ${branch}, but the branch already has the generated cask."
            fi
            exit 0
          fi

          git commit -m "feat(homebrew): bump table-view to ${RELEASE_TAG}"
          git push -u origin "${branch}"

          if gh pr view --repo "${HOMEBREW_TAP_REPO}" "${branch}" > /dev/null 2>&1; then
            echo "PR already exists for ${branch}."
            exit 0
          fi

          pr_body="$(cat <<EOF
          ## Summary

          Automatically updated Homebrew cask for ${RELEASE_TAG}.

          ## Changes

          - Updated version/url/checksums in Casks/table-view.rb

          ## Invariants

          - App runtime behavior is unchanged.
          - Homebrew tap metadata continues to point at published release assets.

          ## Test plan

          - Generated cask metadata from the published GitHub release assets.

          ## Smoke impact

          Smoke-Test-Plan: Not required: packaging metadata only.

          ## Documentation impact

          - Required: no
          - Trigger: none
          - Updated SOT: n/a
          - Reason: Packaging metadata update only; no app runtime, workflow, or user-facing documentation changed.

          ## Links

          - Release: ${RELEASE_TAG}
          EOF
          )"

          gh pr create \
            --repo "${HOMEBREW_TAP_REPO}" \
            --title "chore(homebrew): update table-view cask ${RELEASE_TAG}" \
            --body "${pr_body}" \
            --base "${base_branch}" \
            --head "${branch}"
