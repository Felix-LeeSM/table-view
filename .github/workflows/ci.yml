name: CI

# Trigger policy:
# - `push` on `main` only: validates what actually landed (post-merge gate).
# - `pull_request`: validates feature branches before they merge.
# This avoids the duplicate run that fires when an open PR's branch is
# pushed (push + pull_request would each schedule a separate workflow on
# the same SHA).
on:
  push:
    branches: [main]
  pull_request:

# Always cancel in-flight runs on the same ref when a newer commit
# arrives — the previous run's result is stale the moment a new commit
# lands, both on PR branches and on `main`. We trade "permanent green
# tip-of-main signal" for "fast feedback on the latest commit"; the
# latest commit's run is what actually represents the state of `main`.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: Cache Vite transform output
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-${{ hashFiles('vite.config.ts', 'tsconfig.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            vite-${{ hashFiles('vite.config.ts', 'tsconfig.json') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Theme contrast (WCAG AA)
        run: pnpm contrast:check

      - name: Build
        run: pnpm build

  rust:
    name: Rust Unit And Storage Tests
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Run cargo tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --test storage_integration

  integration-tests:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: table_view_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d table_view_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Run integration tests
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: testuser
          PGPASSWORD: testpass
          PGDATABASE: table_view_test
        run: cargo test --manifest-path src-tauri/Cargo.toml --test schema_integration --test query_integration

  # ADR 0019 (2026-05-01) — E2E job removed from CI.
  #
  # Linux/xvfb/WebKitGTK/tauri-driver stack diverges from production
  # (macOS WKWebView / Windows WebView2) and produced non-deterministic
  # cold-boot timeouts despite Sprint 172~175 stabilization (shard split,
  # GHA cache, mocha/helper timeout bumps, ARIA forensic dumps). E2E now
  # runs host-native via lefthook `pre-push` → `scripts/e2e-host.sh`,
  # gated by `.claude/hooks/pre-bash.sh` against `--no-verify` /
  # `LEFTHOOK=0` bypasses. See `memory/decisions/0019-e2e-pre-push-not-ci/`
  # and ADR 0015 (Superseded).
