name: CI

# Trigger policy:
# - `push` on `main` only: validates what actually landed (post-merge gate).
# - `pull_request`: validates feature branches before they merge and reruns
#   when the GitHub-visible PR body changes.
# This avoids the duplicate run that fires when an open PR's branch is
# pushed (push + pull_request would each schedule a separate workflow on
# the same SHA).
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, edited, reopened, synchronize]

# Always cancel in-flight runs on the same branch when a newer commit
# arrives — the previous run's result is stale the moment a new commit
# lands, both on PR branches and on `main`. We trade "permanent green
# tip-of-main signal" for "fast feedback on the latest commit"; the
# latest commit's run is what actually represents the state of `main`.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pr-body:
    name: PR Body Contract
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0

      - name: Test PR body checker
        run: bash scripts/hooks/test-check-pr-body.sh

      - name: Validate PR body
        run: node scripts/hooks/check-pr-body.mjs

  doc-size:
    name: Doc Size Advisory (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # advisory (non-blocking) — 현재 회귀 0 (최대 106K chars < 120K cap). threshold 는 추후 ratchet.
    # pre-push 에는 연동하지 않는다 (신규 advisory 정책). block 전환은 분할 정리 후 별도 결정.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check doc size
        run: bash scripts/hooks/check-doc-size.sh

  dependency-security:
    name: Dependency Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_DENY_VERSION: "0.19.9"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Cache cargo-deny
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-deny
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-deny-${{ runner.os }}-${{ env.CARGO_DENY_VERSION }}

      - name: Install pinned cargo-deny
        run: |
          if ! cargo deny --version 2>/dev/null | grep -Fx "cargo-deny ${CARGO_DENY_VERSION}" >/dev/null; then
            cargo install cargo-deny --version "$CARGO_DENY_VERSION" --locked --force
          fi
          cargo deny --version | grep -Fx "cargo-deny ${CARGO_DENY_VERSION}"

      - name: Dependency security summary
        run: bash scripts/hooks/cargo-deny-summary.sh

      # Blocking gate. bans/licenses/sources are properties of *this PR's*
      # dependency set — a banned crate, disallowed license, or untrusted
      # source only appears when someone changes dependencies, so failing the
      # PR is the correct signal. Advisories are decoupled into the
      # `dependency-advisories` job below: a new RUSTSEC advisory is an external
      # event independent of the PR (2026-07-02 incident: one new advisory
      # turned 2 main pushes + 1 unrelated PR red at once).
      - name: Run cargo deny (bans, licenses, sources)
        working-directory: src-tauri
        run: cargo deny check bans licenses sources --hide-inclusion-graph

  dependency-advisories:
    name: Dependency Advisories (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Non-blocking (`continue-on-error`) advisory scan, split out of the
    # blocking gate above. A RUSTSEC advisory is an event about the outside
    # world, not about the code in any given PR, so it must never turn every
    # open PR and main push red at once (2026-07-02 incident). The signal stays
    # visible in the Actions log. Auto-filing an issue on failure is a
    # follow-up, out of scope for this PR.
    continue-on-error: true
    env:
      CARGO_DENY_VERSION: "0.19.9"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Cache cargo-deny
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-deny
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-deny-${{ runner.os }}-${{ env.CARGO_DENY_VERSION }}

      - name: Install pinned cargo-deny
        run: |
          if ! cargo deny --version 2>/dev/null | grep -Fx "cargo-deny ${CARGO_DENY_VERSION}" >/dev/null; then
            cargo install cargo-deny --version "$CARGO_DENY_VERSION" --locked --force
          fi
          cargo deny --version | grep -Fx "cargo-deny ${CARGO_DENY_VERSION}"

      - name: Run cargo deny (advisories)
        working-directory: src-tauri
        run: cargo deny check advisories --hide-inclusion-graph

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Vite transform output
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          # Key on config + lockfile only; src 파일 해시는 거의 매 커밋
          # 변경되어 cache miss 가 거의 100% 였음 (audit m6, 2026-05-05).
          # restore-keys 로 부분 일치도 허용 → 전혀 다른 src 변경에서도
          # cache reuse 가능.
          key: vite-${{ runner.os }}-${{ hashFiles('vite.config.ts', 'tsconfig.json', 'package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            vite-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch coverage ratchet base
        run: git fetch --no-tags --prune --depth=1 origin refs/heads/main:refs/remotes/origin/main

      - name: Coverage ratchet
        env:
          COVERAGE_RATCHET_REQUIRE_MAIN: "1"
        run: pnpm exec tsx scripts/check-coverage-ratchet.ts

      - name: WASM size budget
        run: pnpm wasm:size

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test -- --run --coverage --coverage.reporter=text-summary

      - name: Build
        run: pnpm build

  frontend-advisory:
    name: Frontend Advisory (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # docs:links and contrast:check sat on the blocking frontend job's critical
    # path (9m11s bottleneck) but neither gates a merge. Moved here as a
    # non-blocking job (`continue-on-error`) so the frontend gate keeps only
    # ratchet → wasm:size → lint → test → build.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Documentation links (advisory)
        run: pnpm docs:links
        continue-on-error: true

      # ADR 0031 의 contrast gate 는 advisory 로 강등 (2026-05-17, sprint-384).
      # 72 themes × syntax 12 토큰 = 864 pair 중 다수가 WCAG AA 4.5:1 미달.
      # 시방서 출력 그대로 import 한 결과이고 fix 는 디자인 결정 + 광범위
      # 토큰 수정 필요 (별 sprint). 본 step 이 strict 하면 모든 PR 머지 차단.
      # `continue-on-error` 로 결과를 *경고*로만 표시 — 통계는 actions log 에
      # 남고 ADR 0031 정책은 *future enforcement* (별 sprint) 로 promote.
      - name: Theme contrast (WCAG AA, advisory)
        run: pnpm contrast:check
        continue-on-error: true

  rust:
    name: Rust Unit And Storage Tests
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-bin: false
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run cargo tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --test storage_integration

      # Sprint 390 (2026-05-17) — sprint-385 review found that the
      # `sql-parser-core` path crate's 31 lib tests and the
      # `parse_sql_backend` integration test (2 tests) were NOT covered
      # by the Rust job above: the previous `cargo test --manifest-path
      # src-tauri/Cargo.toml --lib --test storage_integration` line only
      # runs `table-view`'s lib tests + one named integration target.
      # Wire them in as separate steps so a regression in either set
      # fails CI. Steps run serially with default `if: success()` — a
      # failure in the table-view lib tests short-circuits the rest,
      # which is the desired blast-radius behavior (fix upstream first).
      - name: Run sql-parser-core unit tests
        run: cargo test --manifest-path src-tauri/sql-parser-core/Cargo.toml --lib
      - name: Run parse_sql_backend integration test
        run: cargo test --manifest-path src-tauri/Cargo.toml --test parse_sql_backend

  rust-static:
    name: Rust Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # clippy --all-features pulls the full Tauri feature graph, which needs
      # the WebKitGTK/GTK system libraries to compile on Linux. Mirrors the
      # integration-tests job's apt step.
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-bin: false
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Mirror lefthook.yml pre-commit rust-format / rust-clippy exactly so a
      # local pre-commit pass and CI agree. lefthook runs only
      # `cd src-tauri && cargo fmt --check` / `cargo clippy --all-targets
      # --all-features -- -D warnings`; it does not invoke the sql-parser-core
      # path crate as a separate command, so CI mirrors just these two.
      - name: Rustfmt (mirror lefthook rust-format)
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy (mirror lefthook rust-clippy)
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

  integration-tests:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 40

    # Sprint 237 P5+ (2026-05-08) — PG/Mongo 둘 다 GHA service container 로
    # 띄우고 환경변수로 endpoint 를 노출. tests/common/mod.rs 의
    # pg_endpoint/mongo_endpoint helper 가 PGHOST/MONGO_HOST 가 있으면
    # testcontainers 를 띄우지 않고 외부 인스턴스를 그대로 재사용하므로,
    # GHA service 와 testcontainers 가 자연스럽게 swap-in/out 된다.
    # Redis는 별도 GHA service 없이 `redis_integration` testcontainer 가
    # 자체 lifecycle 을 소유한다.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: table_view_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d table_view_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
      mongodb:
        # auth 비활성 default. tests/common/mod.rs 가 user 없는 익명 연결
        # 을 지원하므로 추가 셋팅 불필요.
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Show disk usage before integration build
        run: |
          df -h /
          du -sh src-tauri/target 2>/dev/null || true
          docker system df || true

      - name: Free disk headroom before integration build
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune -af || true
          df -h /
          docker system df || true

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-bin: false
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run integration tests
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: testuser
          PGPASSWORD: testpass
          PGDATABASE: table_view_test
          MONGO_HOST: localhost
          MONGO_PORT: 27017
        run: cargo test --manifest-path src-tauri/Cargo.toml --test schema_integration --test query_integration --test mongo_integration --test fixture_loading --test redis_integration

  # Runtime E2E smoke lives in .github/workflows/e2e-smoke.yml as a
  # blocking remote check on pull requests and main. This workflow keeps the
  # non-runtime correctness gates.
  #   Blocking: dependency-security (bans/licenses/sources), frontend
  #   (ratchet → wasm:size → lint → test → build), rust-static (fmt + clippy,
  #   mirrors lefthook), rust unit/storage tests, integration tests.
  #   Non-blocking (advisory): doc-size, dependency-advisories (RUSTSEC),
  #   frontend-advisory (docs:links + WCAG contrast).
