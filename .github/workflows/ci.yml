name: CI

# Trigger policy:
# - `push` on `main` only: validates what actually landed (post-merge gate).
# - `pull_request`: validates feature branches before they merge.
# This avoids the duplicate run that fires when an open PR's branch is
# pushed (push + pull_request would each schedule a separate workflow on
# the same SHA).
on:
  push:
    branches: [main]
  pull_request:

# Always cancel in-flight runs on the same ref when a newer commit
# arrives — the previous run's result is stale the moment a new commit
# lands, both on PR branches and on `main`. We trade "permanent green
# tip-of-main signal" for "fast feedback on the latest commit"; the
# latest commit's run is what actually represents the state of `main`.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: Cache Vite transform output
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          # Key on config + lockfile only; src 파일 해시는 거의 매 커밋
          # 변경되어 cache miss 가 거의 100% 였음 (audit m6, 2026-05-05).
          # restore-keys 로 부분 일치도 허용 → 전혀 다른 src 변경에서도
          # cache reuse 가능.
          key: vite-${{ hashFiles('vite.config.ts', 'tsconfig.json', 'package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            vite-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      # ADR 0031 의 contrast gate 는 advisory 로 강등 (2026-05-17, sprint-384).
      # 72 themes × syntax 12 토큰 = 864 pair 중 다수가 WCAG AA 4.5:1 미달.
      # 시방서 출력 그대로 import 한 결과이고 fix 는 디자인 결정 + 광범위
      # 토큰 수정 필요 (별 sprint). 본 step 이 strict 하면 모든 PR 머지 차단.
      # `continue-on-error` 로 결과를 *경고*로만 표시 — 통계는 actions log 에
      # 남고 ADR 0031 정책은 *future enforcement* (별 sprint) 로 promote.
      - name: Theme contrast (WCAG AA, advisory)
        run: pnpm contrast:check
        continue-on-error: true

      - name: Build
        run: pnpm build

  rust:
    name: Rust Unit And Storage Tests
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-bin: false

      - name: Run cargo tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --test storage_integration

  integration-tests:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Sprint 237 P5+ (2026-05-08) — PG/Mongo 둘 다 GHA service container 로
    # 띄우고 환경변수로 endpoint 를 노출. tests/common/mod.rs 의
    # pg_endpoint/mongo_endpoint helper 가 PGHOST/MONGO_HOST 가 있으면
    # testcontainers 를 띄우지 않고 외부 인스턴스를 그대로 재사용하므로,
    # GHA service 와 testcontainers 가 자연스럽게 swap-in/out 된다.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: table_view_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d table_view_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
      mongodb:
        # auth 비활성 default. tests/common/mod.rs 가 user 없는 익명 연결
        # 을 지원하므로 추가 셋팅 불필요.
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-bin: false

      - name: Run integration tests
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: testuser
          PGPASSWORD: testpass
          PGDATABASE: table_view_test
          MONGO_HOST: localhost
          MONGO_PORT: 27017
        run: cargo test --manifest-path src-tauri/Cargo.toml --test schema_integration --test query_integration --test mongo_integration --test fixture_loading

  # Runtime E2E smoke lives in .github/workflows/e2e-smoke.yml as an
  # informational check. This workflow remains the correctness gate:
  # lint/test/build plus Rust unit and integration coverage.
