name: CI

# Trigger policy:
# - `push` on `main` only: validates what actually landed (post-merge gate).
# - `pull_request`: validates feature branches before they merge.
# This avoids the duplicate run that fires when an open PR's branch is
# pushed (push + pull_request would each schedule a separate workflow on
# the same SHA).
on:
  push:
    branches: [main]
  pull_request:

# Always cancel in-flight runs on the same ref when a newer commit
# arrives — the previous run's result is stale the moment a new commit
# lands, both on PR branches and on `main`. We trade "permanent green
# tip-of-main signal" for "fast feedback on the latest commit"; the
# latest commit's run is what actually represents the state of `main`.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: Cache Vite transform output
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-${{ hashFiles('vite.config.ts', 'tsconfig.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            vite-${{ hashFiles('vite.config.ts', 'tsconfig.json') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Theme contrast (WCAG AA)
        run: pnpm contrast:check

      - name: Build
        run: pnpm build

  rust:
    name: Rust Unit And Storage Tests
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Run cargo tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --test storage_integration

  integration-tests:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: table_view_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d table_view_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Run integration tests
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: testuser
          PGPASSWORD: testpass
          PGDATABASE: table_view_test
        run: cargo test --manifest-path src-tauri/Cargo.toml --test schema_integration --test query_integration

  e2e:
    name: E2E Tests (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # sprint-173 — split the spec files into 4 alphabetical shards so
    # each runner does 1/4 of the work in parallel. `fail-fast: false`
    # so one shard's failure still surfaces the others' results, which
    # makes triage faster than a single 11-minute job that aborts on
    # the first regression.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # sprint-173 caching: image build + cargo target.
      #
      # Measured on run 25147699532 (cold cache):
      #   - Dockerfile build       ~108s  (apt 48s + rustup 10s + tauri-driver 18s + node/pnpm/mongosh ~25s)
      #   - in-container `pnpm tauri build --debug`  ~156s
      # Both layers were rebuilt from scratch on every shard (4×) every run
      # because (a) the `tauri-target` named volume is per-runner-VM and
      # ephemeral and (b) compose's `--build` had no shared cache. With
      # GHA's actions/cache + buildx GHA cache backend, subsequent pushes
      # hit the cache for both, cutting per-shard wall-clock by ~4 min.
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Tauri debug target
        uses: actions/cache@v4
        with:
          path: cargo-target
          # Keying on Rust source hash ensures source edits invalidate
          # the cache; the restore-keys ladder still hits cargo's
          # incremental cache from the most-recent prior build.
          key: e2e-tauri-target-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml', 'src-tauri/tauri.e2e.conf.json', 'src-tauri/src/**/*.rs', 'src-tauri/build.rs') }}
          restore-keys: |
            e2e-tauri-target-

      - name: Build E2E image with GHA buildx cache
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.e2e
          load: true
          tags: table-view-e2e:local
          cache-from: type=gha,scope=e2e
          cache-to: type=gha,mode=max,scope=e2e

      # The entire E2E pipeline (Postgres + Mongo + tauri-driver + xvfb +
      # WebdriverIO) runs inside the `table-view-e2e:local` image built from
      # Dockerfile.e2e. Drift between this job and the local
      # `pnpm test:e2e:docker` entrypoint is treated as a defect (sprint-169
      # ADR 0015). `--exit-code-from e2e` propagates WebdriverIO's exit code.
      # `--build` is intentionally omitted — the buildx step above already
      # tagged the image as `table-view-e2e:local` (matching compose's
      # `image:` field), so compose reuses it instead of rebuilding.
      - name: Run E2E suite via docker compose
        env:
          PGUSER: testuser
          PGPASSWORD: testpass
          PGDATABASE: table_view_test
          MONGO_USER: testuser
          MONGO_PASSWORD: testpass
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: 4
        run: |
          mkdir -p cargo-target
          docker compose --profile test up --abort-on-container-exit --exit-code-from e2e

      # The container runs as root, so cargo writes target files as root
      # on the host bind-mount. actions/cache's post-step runs as the
      # `runner` user and would fail to tar root-owned files. Chown back
      # before the implicit cache-save fires.
      - name: Reset cache dir ownership
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" cargo-target || true

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose --profile test ps -a || true
          docker compose --profile test logs --no-color --timestamps e2e || true

      - name: Upload E2E logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-shard-${{ matrix.shard }}
          path: e2e/wdio-report/
