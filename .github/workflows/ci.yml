name: CI

# Trigger policy:
# - `push` on `main` only: validates what actually landed (post-merge gate).
# - `pull_request`: validates feature branches before they merge and reruns
#   when the GitHub-visible PR body changes.
# This avoids the duplicate run that fires when an open PR's branch is
# pushed (push + pull_request would each schedule a separate workflow on
# the same SHA).
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, edited, reopened, synchronize]

# Cancel policy differs by event (audit 2026-07-03):
# - pull_request: cancel in-flight runs when a newer commit arrives — the old
#   run is stale the moment a new commit lands, and fast feedback wins.
# - push to main: do NOT cancel. Let the running post-merge run finish; GitHub
#   keeps at most one running + one pending per group and replaces the pending
#   one, so a burst of N merges converges to first-run + last-run = 2 runs.
#   Cancelling on main could leave zero main runs ever completing during a merge
#   wave, which (a) forfeits the rust-cache main save (only main writes the
#   shared cache) and (b) opens a post-merge verification gap — the background
#   condition behind the 3-week-frozen partial e2e cache. Cost: the tip-of-main
#   signal lags by up to one run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Lightweight change-detection gate (audit 2026-07-03 #5). docs/memory-only
  # PRs (memory-palace ops make these common) were burning the full ~9m CI. This
  # job classifies the change set; heavy jobs below gate on its output.
  # We deliberately do NOT use workflow-level paths-ignore: the branch-protection
  # ruleset requires Frontend Checks / Rust Unit And Storage Tests / Integration
  # Tests (Docker) contexts, and a workflow that never runs leaves those
  # "expected/missing" forever. A job skipped by `if:` still reports a check run
  # that satisfies the required status check (GitHub docs: skipped checks are
  # treated as successful), so job-level skip is the safe lever.
  changes:
    name: Detect Change Scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code_changed: ${{ steps.detect.outputs.code_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so the PR merge-base (three-dot diff) and the main-push
          # `before` sha are both reachable for git diff.
          fetch-depth: 0

      - name: Detect change scope
        id: detect
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: bash scripts/hooks/detect-change-scope.sh

  pr-body:
    name: PR Body Contract
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0

      - name: Test PR body checker
        run: bash scripts/hooks/test-check-pr-body.sh

      - name: Validate PR body
        run: node scripts/hooks/check-pr-body.mjs

  doc-size:
    name: Doc Size Advisory (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # advisory (non-blocking) — 현재 회귀 0 (최대 106K chars < 120K cap). threshold 는 추후 ratchet.
    # pre-push 에는 연동하지 않는다 (신규 advisory 정책). block 전환은 분할 정리 후 별도 결정.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check doc size
        run: bash scripts/hooks/check-doc-size.sh

  dependency-security:
    name: Dependency Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    # Fail-closed: skip heavy job ONLY when `changes` succeeded AND classified
    # the set as docs-only. If `changes` itself failed/was cancelled (infra),
    # its outputs are empty and result != 'success', so this runs full — a
    # detection failure must never let unverified code satisfy a required check.
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.code_changed == 'true')
    env:
      CARGO_DENY_VERSION: "0.19.9"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Cache cargo-deny
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-deny
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-deny-${{ runner.os }}-${{ env.CARGO_DENY_VERSION }}

      - name: Install pinned cargo-deny
        run: |
          if ! cargo deny --version 2>/dev/null | grep -Fx "cargo-deny ${CARGO_DENY_VERSION}" >/dev/null; then
            cargo install cargo-deny --version "$CARGO_DENY_VERSION" --locked --force
          fi
          cargo deny --version | grep -Fx "cargo-deny ${CARGO_DENY_VERSION}"

      - name: Dependency security summary
        run: bash scripts/hooks/cargo-deny-summary.sh

      # Blocking gate. bans/licenses/sources are properties of *this PR's*
      # dependency set — a banned crate, disallowed license, or untrusted
      # source only appears when someone changes dependencies, so failing the
      # PR is the correct signal. Advisories are decoupled into the
      # `dependency-advisories` job below: a new RUSTSEC advisory is an external
      # event independent of the PR (2026-07-02 incident: one new advisory
      # turned 2 main pushes + 1 unrelated PR red at once).
      - name: Run cargo deny (bans, licenses, sources)
        working-directory: src-tauri
        run: cargo deny check bans licenses sources --hide-inclusion-graph

  dependency-advisories:
    name: Dependency Advisories (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    # Fail-closed: skip heavy job ONLY when `changes` succeeded AND classified
    # the set as docs-only. If `changes` itself failed/was cancelled (infra),
    # its outputs are empty and result != 'success', so this runs full — a
    # detection failure must never let unverified code satisfy a required check.
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.code_changed == 'true')
    # Non-blocking (`continue-on-error`) advisory scan, split out of the
    # blocking gate above. A RUSTSEC advisory is an event about the outside
    # world, not about the code in any given PR, so it must never turn every
    # open PR and main push red at once (2026-07-02 incident). The signal stays
    # visible in the Actions log. Auto-filing an issue on failure is a
    # follow-up, out of scope for this PR.
    continue-on-error: true
    env:
      CARGO_DENY_VERSION: "0.19.9"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Cache cargo-deny
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-deny
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-deny-${{ runner.os }}-${{ env.CARGO_DENY_VERSION }}

      - name: Install pinned cargo-deny
        run: |
          if ! cargo deny --version 2>/dev/null | grep -Fx "cargo-deny ${CARGO_DENY_VERSION}" >/dev/null; then
            cargo install cargo-deny --version "$CARGO_DENY_VERSION" --locked --force
          fi
          cargo deny --version | grep -Fx "cargo-deny ${CARGO_DENY_VERSION}"

      - name: Run cargo deny (advisories)
        working-directory: src-tauri
        run: cargo deny check advisories --hide-inclusion-graph

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: changes
    # Fail-closed: skip heavy job ONLY when `changes` succeeded AND classified
    # the set as docs-only. If `changes` itself failed/was cancelled (infra),
    # its outputs are empty and result != 'success', so this runs full — a
    # detection failure must never let unverified code satisfy a required check.
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.code_changed == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch coverage ratchet base
        # Force refspec (leading `+`): concurrent main pushes advance origin/main
        # between checkout and this fetch, and a plain shallow fetch rejects the
        # non-fast-forward update. The ratchet only ever compares against the
        # current main tip, so overwriting the local ref is the intended base.
        run: git fetch --no-tags --prune --depth=1 origin +refs/heads/main:refs/remotes/origin/main

      - name: Coverage ratchet
        env:
          COVERAGE_RATCHET_REQUIRE_MAIN: "1"
        run: pnpm exec tsx scripts/check-coverage-ratchet.ts

      - name: WASM size budget
        run: pnpm wasm:size

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test -- --run --coverage --coverage.reporter=text-summary

      - name: Build
        run: pnpm build

  frontend-advisory:
    name: Frontend Advisory (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Intentionally NOT change-gated: docs:links is most useful on docs-only
    # PRs, so this job always runs. Non-blocking (continue-on-error) means the
    # extra pnpm install cost never gates a merge.
    # docs:links and contrast:check sat on the blocking frontend job's critical
    # path (9m11s bottleneck) but neither gates a merge. Moved here as a
    # non-blocking job (`continue-on-error`) so the frontend gate keeps only
    # ratchet → wasm:size → lint → test → build.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Documentation links (advisory)
        run: pnpm docs:links
        continue-on-error: true

      # ADR 0031 의 contrast gate 는 advisory 로 강등 (2026-05-17, sprint-384).
      # 72 themes × syntax 12 토큰 = 864 pair 중 다수가 WCAG AA 4.5:1 미달.
      # 시방서 출력 그대로 import 한 결과이고 fix 는 디자인 결정 + 광범위
      # 토큰 수정 필요 (별 sprint). 본 step 이 strict 하면 모든 PR 머지 차단.
      # `continue-on-error` 로 결과를 *경고*로만 표시 — 통계는 actions log 에
      # 남고 ADR 0031 정책은 *future enforcement* (별 sprint) 로 promote.
      - name: Theme contrast (WCAG AA, advisory)
        run: pnpm contrast:check
        continue-on-error: true

  rust:
    name: Rust Unit And Storage Tests
    runs-on: macos-latest
    timeout-minutes: 20
    needs: changes
    # Fail-closed: skip heavy job ONLY when `changes` succeeded AND classified
    # the set as docs-only. If `changes` itself failed/was cancelled (infra),
    # its outputs are empty and result != 'success', so this runs full — a
    # detection failure must never let unverified code satisfy a required check.
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.code_changed == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # sql-parser-core is a path crate (not a workspace member), so the
          # standalone `--manifest-path src-tauri/sql-parser-core/Cargo.toml`
          # test below compiles into its OWN target dir. Caching only
          # `src-tauri -> target` left it uncached, recompiling every run
          # (audit 2026-07-03). List its target as a second workspace.
          workspaces: |
            src-tauri -> target
            src-tauri/sql-parser-core -> target
          cache-bin: false
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run cargo tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --test storage_integration

      # Sprint 390 (2026-05-17) — sprint-385 review found that the
      # `sql-parser-core` path crate's 31 lib tests and the
      # `parse_sql_backend` integration test (2 tests) were NOT covered
      # by the Rust job above: the previous `cargo test --manifest-path
      # src-tauri/Cargo.toml --lib --test storage_integration` line only
      # runs `table-view`'s lib tests + one named integration target.
      # Wire them in as separate steps so a regression in either set
      # fails CI. Steps run serially with default `if: success()` — a
      # failure in the table-view lib tests short-circuits the rest,
      # which is the desired blast-radius behavior (fix upstream first).
      - name: Run sql-parser-core unit tests
        run: cargo test --manifest-path src-tauri/sql-parser-core/Cargo.toml --lib
      - name: Run parse_sql_backend integration test
        run: cargo test --manifest-path src-tauri/Cargo.toml --test parse_sql_backend

  rust-static:
    name: Rust Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    # Fail-closed: skip heavy job ONLY when `changes` succeeded AND classified
    # the set as docs-only. If `changes` itself failed/was cancelled (infra),
    # its outputs are empty and result != 'success', so this runs full — a
    # detection failure must never let unverified code satisfy a required check.
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.code_changed == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # clippy --all-features pulls the full Tauri feature graph, which needs
      # the WebKitGTK/GTK system libraries to compile on Linux. Mirrors the
      # integration-tests job's apt step.
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-bin: false
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Mirror lefthook.yml pre-commit rust-format / rust-clippy exactly so a
      # local pre-commit pass and CI agree. lefthook runs only
      # `cd src-tauri && cargo fmt --check` / `cargo clippy --all-targets
      # --all-features -- -D warnings`; it does not invoke the sql-parser-core
      # path crate as a separate command, so CI mirrors just these two.
      - name: Rustfmt (mirror lefthook rust-format)
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy (mirror lefthook rust-clippy)
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

  integration-tests:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    # Raised 40 -> 60: this job now runs instrumented `cargo llvm-cov nextest`
    # coverage (promoted from pre-push) plus MySQL/MSSQL testcontainers, both
    # heavier than the former plain `cargo test`.
    timeout-minutes: 60
    needs: changes
    # Fail-closed: skip heavy job ONLY when `changes` succeeded AND classified
    # the set as docs-only. If `changes` itself failed/was cancelled (infra),
    # its outputs are empty and result != 'success', so this runs full — a
    # detection failure must never let unverified code satisfy a required check.
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.code_changed == 'true')

    # Sprint 237 P5+ (2026-05-08) — PG/Mongo 둘 다 GHA service container 로
    # 띄우고 환경변수로 endpoint 를 노출. tests/common/mod.rs 의
    # pg_endpoint/mongo_endpoint helper 가 PGHOST/MONGO_HOST 가 있으면
    # testcontainers 를 띄우지 않고 외부 인스턴스를 그대로 재사용하므로,
    # GHA service 와 testcontainers 가 자연스럽게 swap-in/out 된다.
    # Redis는 별도 GHA service 없이 `redis_integration` testcontainer 가
    # 자체 lifecycle 을 소유한다.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: table_view_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d table_view_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
      mongodb:
        # auth 비활성 default. tests/common/mod.rs 가 user 없는 익명 연결
        # 을 지원하므로 추가 셋팅 불필요.
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          # llvm-tools-preview backs `cargo llvm-cov`'s source-based coverage.
          components: llvm-tools-preview

      # cargo-llvm-cov + cargo-nextest back the promoted integration coverage
      # gate below. taiki-e/install-action downloads pinned prebuilt binaries
      # (versions match the local pre-push toolchain from scripts/setup.sh) and
      # caches them, so no per-run source build lands on the 40m+ critical path.
      - name: Install cargo-llvm-cov and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.7,cargo-nextest@0.9.137

      - name: Show disk usage before integration build
        run: |
          df -h /
          du -sh src-tauri/target 2>/dev/null || true
          docker system df || true

      - name: Free disk headroom before integration build
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune -af || true
          df -h /
          docker system df || true

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-bin: false
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Rust integration coverage gate (audit 2026-07-03 #6). Promoted here from
      # the local pre-push rust route so a required *remote* check — not just the
      # dev machine's hook — owns the integration coverage floor. Runs the exact
      # push nextest profile + llvm-cov thresholds (lines 80 / functions 75 /
      # regions 80), ratchet-locked in scripts/coverage-ratchet-targets.json
      # (`rust.pre_push.integration`; check-coverage-ratchet.ts reads the
      # thresholds from this step). This coverage run REPLACES the former plain
      # `cargo test` step (no reason to run the same tests twice): it adds the
      # nine push-profile integration binaries + --lib, and keeps
      # redis_integration — which the plain test ran and the old pre-push
      # coverage command omitted — so no test signal is lost. PG/Mongo reuse the
      # GHA services via PGHOST/MONGO_HOST; MySQL/MSSQL/Redis fall back to their
      # self-owned testcontainers (Docker is present on the runner). Instrumented
      # build + extra testcontainers cost more wall-clock than the old plain
      # test — the accepted promotion trade-off (timeout raised 40 -> 60m).
      - name: Run integration coverage
        working-directory: src-tauri
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: testuser
          PGPASSWORD: testpass
          PGDATABASE: table_view_test
          MONGO_HOST: localhost
          MONGO_PORT: 27017
        run: |
          cargo llvm-cov nextest --profile push --lib \
            --test storage_integration \
            --test query_integration \
            --test schema_integration \
            --test value_search_integration \
            --test fixture_loading \
            --test mongo_integration \
            --test mysql_integration \
            --test duckdb_file_analytics \
            --test mariadb_ddl_preview \
            --test mssql_connection_routing \
            --test redis_integration \
            --summary-only \
            --fail-under-lines 80 \
            --fail-under-functions 75 \
            --fail-under-regions 80

  # Runtime E2E smoke lives in .github/workflows/e2e-smoke.yml as a
  # blocking remote check on pull requests and main. This workflow keeps the
  # non-runtime correctness gates.
  #   Blocking: dependency-security (bans/licenses/sources), frontend
  #   (ratchet → wasm:size → lint → test → build), rust-static (fmt + clippy,
  #   mirrors lefthook), rust unit/storage tests, integration coverage
  #   (`cargo llvm-cov nextest --profile push`, thresholds 80/75/80 — promoted
  #   from the local pre-push rust route, audit 2026-07-03 #6).
  #   Non-blocking (advisory): doc-size, dependency-advisories (RUSTSEC),
  #   frontend-advisory (docs:links + WCAG contrast).
  # The blocking jobs + dependency-advisories gate on `changes` with a
  # fail-closed `if:` (skip only when `changes` succeeded AND said docs-only;
  # any detection failure runs full), so docs/memory/*.md-only changes skip them
  # while a broken detector never satisfies a required check by skip. pr-body,
  # doc-size, and frontend-advisory always run (cheap / docs:links matters most
  # on docs PRs).
