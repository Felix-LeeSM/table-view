name: E2E Smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-smoke-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TAURI_DRIVER_VERSION: "2.0.6"

jobs:
  e2e-smoke-prepare:
    name: Prepare E2E runtime artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            webkit2gtk-driver \
            xvfb

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Cache Rust dependencies and build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-workspace-crates: false
          cache-bin: false
          cache-on-failure: true
          shared-key: e2e-smoke-linux
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build E2E smoke binary
        env:
          E2E_BUILD_ONLY: "1"
        run: bash scripts/e2e-smoke-ci.sh

      - name: Upload tauri binary
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-tauri-binary
          path: src-tauri/target/debug/table-view
          if-no-files-found: error

  e2e-smoke:
    name: Runtime Happy Path (${{ matrix.spec_key }}, ${{ matrix.spec }})
    needs: e2e-smoke-prepare
    runs-on: ubuntu-latest
    timeout-minutes: 40

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - spec_key: postgres
            spec: e2e/smoke/postgres.spec.ts
          - spec_key: postgres-safe-mode
            spec: e2e/smoke/postgres-safe-mode.spec.ts
          - spec_key: postgres-explain
            spec: e2e/smoke/postgres-explain.spec.ts
          - spec_key: postgres-extension-completion
            spec: e2e/smoke/postgres-extension-completion.spec.ts
          - spec_key: postgres-cancellation
            spec: e2e/smoke/postgres-cancellation.spec.ts
          - spec_key: mysql
            spec: e2e/smoke/mysql.spec.ts
          - spec_key: mariadb
            spec: e2e/smoke/mariadb.spec.ts
          - spec_key: mssql
            spec: e2e/smoke/mssql.spec.ts
          - spec_key: oracle
            spec: e2e/smoke/oracle.spec.ts
          - spec_key: sqlite
            spec: e2e/smoke/sqlite.spec.ts
          - spec_key: duckdb
            spec: e2e/smoke/duckdb.spec.ts
          - spec_key: mongodb
            spec: e2e/smoke/mongodb.spec.ts
          - spec_key: redis
            spec: e2e/smoke/redis.spec.ts
          - spec_key: valkey
            spec: e2e/smoke/valkey.spec.ts
          - spec_key: elasticsearch
            spec: e2e/smoke/elasticsearch.spec.ts
          - spec_key: opensearch
            spec: e2e/smoke/opensearch.spec.ts

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: table_view_test
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d table_view_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: testuser
          MONGO_INITDB_ROOT_PASSWORD: testpass
        ports:
          - 37017:27017
        options: >-
          --health-cmd "mongosh --quiet -u testuser -p testpass --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
          MYSQL_DATABASE: table_view_test
        ports:
          - 13306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -ptestroot --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 10s
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: testroot
          MARIADB_USER: testuser
          MARIADB_PASSWORD: testpass
          MARIADB_DATABASE: table_view_test
        ports:
          - 23306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 10s
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      valkey:
        image: valkey/valkey:8.0-alpine
        ports:
          - 16379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
        env:
          discovery.type: single-node
          xpack.security.enabled: false
          xpack.security.http.ssl.enabled: false
          ES_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 19200:9200
        options: >-
          --health-cmd "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            webkit2gtk-driver \
            xvfb

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore tauri binary
        uses: actions/download-artifact@v5
        with:
          name: e2e-smoke-tauri-binary
          path: src-tauri/target/debug

      - name: Make tauri binary executable
        run: chmod +x src-tauri/target/debug/table-view

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Cache tauri-driver binary
        id: cache-tauri-driver
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-${{ runner.os }}-v${{ env.TAURI_DRIVER_VERSION }}

      - name: Install tauri-driver
        if: steps.cache-tauri-driver.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --version ${{ env.TAURI_DRIVER_VERSION }} --locked

      - name: Start OpenSearch service
        if: matrix.spec_key == 'opensearch'
        run: |
          docker run -d \
            --name table-view-opensearch \
            --publish 29200:9200 \
            --env "discovery.type=single-node" \
            --env "DISABLE_INSTALL_DEMO_CONFIG=true" \
            --env "DISABLE_SECURITY_PLUGIN=true" \
            --env "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m" \
            --ulimit memlock=-1:-1 \
            --ulimit nofile=65536:65536 \
            opensearchproject/opensearch:2.13.0

          for attempt in {1..40}; do
            if curl -fsS "http://localhost:29200/_cluster/health?wait_for_status=yellow&timeout=1s"; then
              exit 0
            fi
            echo "OpenSearch is not ready yet (attempt ${attempt}/40)."
            sleep 5
          done

          docker logs table-view-opensearch || true
          exit 1

      - name: Start MSSQL service
        if: matrix.spec_key == 'mssql'
        run: |
          docker run -d \
            --name table-view-mssql \
            --publish 14333:1433 \
            --env "ACCEPT_EULA=Y" \
            --env "MSSQL_SA_PASSWORD=Testpass123!" \
            mcr.microsoft.com/mssql/server:2022-latest

          for attempt in {1..40}; do
            if docker exec table-view-mssql /opt/mssql-tools18/bin/sqlcmd \
              -S localhost -U sa -P 'Testpass123!' -C -Q 'SELECT 1'; then
              exit 0
            fi
            echo "MSSQL is not ready yet (attempt ${attempt}/40)."
            sleep 5
          done

          docker logs table-view-mssql || true
          exit 1

      - name: Start Oracle service
        if: matrix.spec_key == 'oracle'
        timeout-minutes: 12
        run: |
          docker run -d \
            --name table-view-oracle \
            --publish 1521:1521 \
            --env "ORACLE_PASSWORD=testpass" \
            --env "APP_USER=testuser" \
            --env "APP_USER_PASSWORD=testpass" \
            gvenzl/oracle-xe:21

          for attempt in {1..60}; do
            if docker exec table-view-oracle bash -lc "echo 'SELECT 1 FROM DUAL;' | sqlplus -s testuser/testpass@localhost/XEPDB1 | grep -q '1'"; then
              exit 0
            fi
            echo "Oracle is not ready yet (attempt ${attempt}/60)."
            sleep 5
          done

          docker logs table-view-oracle || true
          exit 1

      - name: Run E2E smoke
        env:
          E2E_PG_HOST: localhost
          E2E_PG_PORT: 15432
          PGUSER: testuser
          PGPASSWORD: testpass
          PGDATABASE: table_view_test
          E2E_MONGO_HOST: localhost
          E2E_MONGO_PORT: 37017
          MONGO_USER: testuser
          MONGO_PASSWORD: testpass
          E2E_MONGO_DB: table_view_test
          E2E_MONGO_AUTH_DB: admin
          E2E_MYSQL_HOST: localhost
          E2E_MYSQL_PORT: 13306
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
          MYSQL_DATABASE: table_view_test
          E2E_MARIADB_HOST: localhost
          E2E_MARIADB_PORT: 23306
          MARIADB_USER: testuser
          MARIADB_PASSWORD: testpass
          MARIADB_DATABASE: table_view_test
          E2E_MSSQL_HOST: localhost
          E2E_MSSQL_PORT: 14333
          MSSQL_USER: sa
          MSSQL_PASSWORD: Testpass123!
          MSSQL_DATABASE: table_view_test
          E2E_ORACLE_HOST: localhost
          E2E_ORACLE_PORT: 1521
          ORACLE_USER: testuser
          ORACLE_PASSWORD: testpass
          E2E_ORACLE_SERVICE: XEPDB1
          E2E_REDIS_HOST: localhost
          E2E_REDIS_PORT: 6379
          E2E_REDIS_DB: 2
          E2E_VALKEY_HOST: localhost
          E2E_VALKEY_PORT: 16379
          E2E_VALKEY_DB: 2
          E2E_ELASTICSEARCH_HOST: localhost
          E2E_ELASTICSEARCH_PORT: 19200
          E2E_OPENSEARCH_HOST: localhost
          E2E_OPENSEARCH_PORT: 29200
          E2E_SKIP_BUILD: "1"
          E2E_SPEC: ${{ matrix.spec }}
          E2E_SPEC_KEY: ${{ matrix.spec_key }}
          E2E_REPORT_DIR: e2e/wdio-report/${{ matrix.spec_key }}
        run: bash scripts/e2e-smoke-ci.sh

      - name: Stop OpenSearch service
        if: always() && matrix.spec_key == 'opensearch'
        run: docker rm --force table-view-opensearch || true

      - name: Stop MSSQL service
        if: always() && matrix.spec_key == 'mssql'
        run: docker rm --force table-view-mssql || true

      - name: Stop Oracle service
        if: always() && matrix.spec_key == 'oracle'
        run: docker rm --force table-view-oracle || true

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts-${{ matrix.spec_key }}
          path: e2e/wdio-report
          if-no-files-found: ignore

  e2e-smoke-required:
    name: Runtime Happy Path
    needs: e2e-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()

    steps:
      - name: Require runtime matrix success
        run: |
          if [ "${{ needs.e2e-smoke.result }}" != "success" ]; then
            echo "Runtime matrix result: ${{ needs.e2e-smoke.result }}"
            exit 1
          fi
          echo "Runtime matrix passed."
