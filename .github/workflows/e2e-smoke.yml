name: E2E Smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-smoke-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TAURI_DRIVER_VERSION: "2.0.6"

jobs:
  e2e-smoke-prepare:
    name: Prepare E2E runtime artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 40

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: table_view_test
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d table_view_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: testuser
          MONGO_INITDB_ROOT_PASSWORD: testpass
        ports:
          - 37017:27017
        options: >-
          --health-cmd "mongosh --quiet -u testuser -p testpass --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
          MYSQL_DATABASE: table_view_test
        ports:
          - 13306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -ptestroot --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 10s
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: testroot
          MARIADB_USER: testuser
          MARIADB_PASSWORD: testpass
          MARIADB_DATABASE: table_view_test
        ports:
          - 23306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 10s

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            webkit2gtk-driver \
            xvfb

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Prepare E2E smoke environment
        env:
          E2E_PG_HOST: localhost
          E2E_PG_PORT: 15432
          PGUSER: testuser
          PGPASSWORD: testpass
          PGDATABASE: table_view_test
          E2E_MONGO_HOST: localhost
          E2E_MONGO_PORT: 37017
          MONGO_USER: testuser
          MONGO_PASSWORD: testpass
          E2E_MONGO_DB: table_view_test
          E2E_MONGO_AUTH_DB: admin
          E2E_MYSQL_HOST: localhost
          E2E_MYSQL_PORT: 13306
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
          MYSQL_DATABASE: table_view_test
          E2E_MARIADB_HOST: localhost
          E2E_MARIADB_PORT: 23306
          MARIADB_USER: testuser
          MARIADB_PASSWORD: testpass
          MARIADB_DATABASE: table_view_test
        run: bash scripts/e2e-smoke-ci.sh

      - name: Upload tauri binary
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-tauri-binary
          path: src-tauri/target/debug/table-view
          if-no-files-found: error

  e2e-smoke:
    name: Runtime Happy Path
    needs: e2e-smoke-prepare
    runs-on: ubuntu-latest
    timeout-minutes: 40

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - spec_key: postgres
            spec: e2e/smoke/postgres.spec.ts
          - spec_key: postgres-safe-mode
            spec: e2e/smoke/postgres-safe-mode.spec.ts
          - spec_key: postgres-explain
            spec: e2e/smoke/postgres-explain.spec.ts
          - spec_key: postgres-extension-completion
            spec: e2e/smoke/postgres-extension-completion.spec.ts
          - spec_key: postgres-cancellation
            spec: e2e/smoke/postgres-cancellation.spec.ts
          - spec_key: mysql
            spec: e2e/smoke/mysql.spec.ts
          - spec_key: mariadb
            spec: e2e/smoke/mariadb.spec.ts
          - spec_key: sqlite
            spec: e2e/smoke/sqlite.spec.ts
          - spec_key: duckdb
            spec: e2e/smoke/duckdb.spec.ts
          - spec_key: mongodb
            spec: e2e/smoke/mongodb.spec.ts

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: table_view_test
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d table_view_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: testuser
          MONGO_INITDB_ROOT_PASSWORD: testpass
        ports:
          - 37017:27017
        options: >-
          --health-cmd "mongosh --quiet -u testuser -p testpass --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
          MYSQL_DATABASE: table_view_test
        ports:
          - 13306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -ptestroot --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 10s
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: testroot
          MARIADB_USER: testuser
          MARIADB_PASSWORD: testpass
          MARIADB_DATABASE: table_view_test
        ports:
          - 23306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 10s

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            webkit2gtk-driver \
            xvfb

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore tauri binary
        uses: actions/download-artifact@v5
        with:
          name: e2e-smoke-tauri-binary
          path: src-tauri/target/debug

      - name: Make tauri binary executable
        run: chmod +x src-tauri/target/debug/table-view

      - name: Cache tauri-driver binary
        id: cache-tauri-driver
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-${{ runner.os }}-v${{ env.TAURI_DRIVER_VERSION }}

      - name: Install tauri-driver
        if: steps.cache-tauri-driver.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --version ${{ env.TAURI_DRIVER_VERSION }} --locked

      - name: Run E2E smoke
        env:
          E2E_PG_HOST: localhost
          E2E_PG_PORT: 15432
          PGUSER: testuser
          PGPASSWORD: testpass
          PGDATABASE: table_view_test
          E2E_MONGO_HOST: localhost
          E2E_MONGO_PORT: 37017
          MONGO_USER: testuser
          MONGO_PASSWORD: testpass
          E2E_MONGO_DB: table_view_test
          E2E_MONGO_AUTH_DB: admin
          E2E_MYSQL_HOST: localhost
          E2E_MYSQL_PORT: 13306
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
          MYSQL_DATABASE: table_view_test
          E2E_MARIADB_HOST: localhost
          E2E_MARIADB_PORT: 23306
          MARIADB_USER: testuser
          MARIADB_PASSWORD: testpass
          MARIADB_DATABASE: table_view_test
          E2E_SKIP_PREPARE: "1"
          E2E_SPEC: ${{ matrix.spec }}
          E2E_SPEC_KEY: ${{ matrix.spec_key }}
          E2E_REPORT_DIR: e2e/wdio-report/${{ matrix.spec_key }}
        run: bash scripts/e2e-smoke-ci.sh

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts-${{ matrix.spec_key }}
          path: e2e/wdio-report
          if-no-files-found: ignore
