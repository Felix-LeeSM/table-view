# Docker Compose configuration for integration tests.
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   ./scripts/wait-for-test-db.sh
#   cargo test --test schema_integration --test query_integration
#   docker compose -f docker-compose.test.yml down

services:
  postgres:
    image: postgres:16-alpine
    container_name: table_view_test_postgres
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: table_view_test
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d table_view_test"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    tmpfs:
      - /var/lib/postgresql/data

  mysql:
    image: mysql:8
    container_name: table_view_test_mysql
    environment:
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
      MYSQL_DATABASE: table_view_test
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 10s
    tmpfs:
      - /var/lib/mysql
