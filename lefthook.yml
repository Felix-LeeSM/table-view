min_version: 1.7.0

# pre-push 노이즈 차단 — 성공한 커맨드의 stdout/stderr는 캡처해서 숨기고,
# 실패 시에만 dump한다. `execution_info`는 어떤 단계가 도는지 표식만 남겨
# 진행 상황을 잃지 않게 한다. (pre-commit은 본래 빠르고 조용해서 이 설정의
# 영향이 거의 없음 — pre-push의 cargo / vitest / docker compose 폭주를
#막는 게 주 목적.)
output:
  - summary
  - failure
  - execution_info

pre-commit:
  parallel: true
  commands:
    rust-format:
      glob: "*.rs"
      run: cd src-tauri && cargo fmt --check
    rust-clippy:
      glob: "*.rs"
      run: cd src-tauri && cargo clippy --all-targets --all-features -- -D warnings
    rust-coverage:
      # pre-commit 의 coverage gate 는 Tier 1 (unit + storage_integration 미포함)
      # 만 측정. Tier 2 (testcontainers 기반 PG/Mongo 통합) 는 매 commit 마다
      # docker cold start 비용이 부담스러우므로 staged path 기반 conditional
      # rust-pg-test / rust-mongo-test 로 분리. pre-push 의 6_rust-coverage
      # 가 모든 통합을 합쳐 instrument + 임계값 검증.
      # baseline (2026-05-08, Tier 1 only): 76.98 / 75.85 / 77.62. cushion 을
      # 위해 75/74/76 임계값 유지.
      glob: "*.rs"
      run: |
        if ! rustup component list --installed 2>/dev/null | grep -q '^llvm-tools'; then
          echo "ERROR: rustup llvm-tools-preview 컴포넌트가 없습니다." >&2
          echo "       cargo llvm-cov 가 interactive 프롬프트로 install 의향을" >&2
          echo "       물어 hook 이 무한 대기할 수 있습니다." >&2
          echo "       'bash scripts/setup.sh' 실행 후 재시도하세요." >&2
          exit 1
        fi
        cd src-tauri && cargo llvm-cov --lib --summary-only \
          --fail-under-lines 75 \
          --fail-under-functions 74 \
          --fail-under-regions 76
    rust-pg-test:
      # Sprint 237 P5+ (2026-05-08) — staged 가 PG adapter 본체를 건드릴
      # 때만 testcontainers 기반 PG 통합 (~30s cold, ~16s cached) 을 트리거.
      # PG 코드를 만지지 않은 일반 commit 에는 영향 없음. Docker daemon 이
      # 없으면 cargo pg-test 가 실패하므로, PG 영역 작업자는 daemon 가동을
      # 사전 조건으로 본다.
      glob: "src-tauri/src/db/postgres/**/*.rs"
      run: cd src-tauri && cargo pg-test
    rust-mongo-test:
      # Sprint 237 P5+ (2026-05-08) — Mongo adapter 본체 staged 시 트리거.
      glob: "src-tauri/src/db/mongodb/**/*.rs"
      run: cd src-tauri && cargo mongo-test
    ts-format:
      glob: "*.{ts,tsx}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    ts-lint:
      glob: "*.{ts,tsx}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    ts-typecheck:
      # `tsc --noEmit` 은 staged 파일 단위로 분리할 수 없다 (전체 프로젝트
      # 그래프를 봐야 type 추론이 정확). .ts/.tsx 가 staged 인 경우에만 트리거.
      glob: "*.{ts,tsx}"
      run: npx tsc --noEmit
    no-secrets:
      run: |
        STAGED=$(git diff --cached --name-only | grep -v '^docs/')
        if [ -n "$STAGED" ] && echo "$STAGED" | xargs grep -lE '(password|secret|api_key|token)\s*=\s*["\x27][^"\x27]{8,}' 2>/dev/null; then
          echo "WARNING: Possible hardcoded secrets detected in staged files"
          exit 1
        fi

pre-push:
  # ADR 0019 (2026-05-01) — E2E를 CI에서 떼고 host-native pre-push 게이트로
  # 이동. push 전에 단위/린트/빌드 체크를 끝낸 다음 e2e가 실제 사용자 환경
  # (macOS WKWebView)에서 통과해야만 push 허용. `--no-verify` / `LEFTHOOK=0`
  # 회피는 `.claude/hooks/pre-bash.sh`에서 차단.
  #
  # 순서: 빠른 체크가 먼저 실패하면 무거운 체크 시간을 아낀다 (fail-fast).
  # `piped: true`로 직렬 실행 — e2e는 cold start ~1-3분이라 다른 체크와
  # 동시에 돌리면 docker boot 비용이 항상 부과됨. 직렬은 또한 실패 원인을
  # 한눈에 짚게 한다.
  piped: true
  commands:
    1_ts-typecheck:
      tags: lint frontend
      run: npx tsc --noEmit
    2_ts-lint:
      tags: lint frontend
      run: npm run lint
    3_tauri-check:
      tags: build
      run: cd src-tauri && cargo check
    4_cargo-deny:
      # license / advisory / banned crate 게이트. deny.toml 참조.
      tags: security rust
      run: cd src-tauri && cargo deny check
    5_cargo-machete:
      # 사용되지 않는 cargo 의존성 검출. 가벼움 (~5s).
      tags: lint rust
      run: cd src-tauri && cargo machete
    6_rust-coverage:
      # `cargo llvm-cov` 가 unit + 모든 통합 테스트를 한 번에 instrument.
      # Tier 2 (testcontainers 기반 PG/Mongo 통합) 가 db/postgres/* 와
      # db/mongodb/* 본체 라인을 hit 하므로 unit-only 대비 +4pp 상승.
      # baseline (2026-05-08, Tier 1+2 통합): 81.30 / 77.97 / 82.08.
      # cushion 을 2pp 두고 임계값 79/76/80.
      # 첫 실행은 PG/Mongo image pull 포함 ~3-5분, 캐시 후 ~1-2분.
      # Docker daemon 부재 환경 (예: 원격 sandbox) 에서는 testcontainers 가
      # 즉시 실패 → push 차단됨. ADR-0019 정신상 push 는 "작동하는 게이트"
      # 만 가져야 하므로, daemon 부재면 PG_TEST_URL/MONGO_HOST 를 셋팅해
      # 외부 인스턴스로 우회해야 한다.
      tags: test rust
      run: |
        if ! rustup component list --installed 2>/dev/null | grep -q '^llvm-tools'; then
          echo "ERROR: rustup llvm-tools-preview 컴포넌트가 없습니다." >&2
          echo "       'bash scripts/setup.sh' 실행 후 재시도하세요." >&2
          exit 1
        fi
        cd src-tauri && cargo llvm-cov --lib \
          --test storage_integration \
          --test query_integration \
          --test schema_integration \
          --test fixture_loading \
          --test mongo_integration \
          --summary-only \
          --fail-under-lines 79 \
          --fail-under-functions 76 \
          --fail-under-regions 80
    7_ts-test:
      tags: test frontend
      run: npm run test -- --run --coverage
    8_e2e:
      # 일시 비활성화 (2026-05-01). pre-push e2e 게이트가 다음 세 가지로
      # 동시에 깨진 상태로, 모든 push를 막고 있어 *전체* 작업이 정지됨.
      # ADR 0019의 "작동하지 않는 게이트는 게이트가 아니다" 논리를 그대로 적용:
      #   1. e2e 도커 이미지 staleness — `pnpm test:e2e:docker`가 `--build`를
      #      쓰지 않아 host source와 image source가 임의로 어긋남. 어제 빌드된
      #      이미지로 12개 누락 commit 상태에서 테스트가 도는 중.
      #   2. credentials drift (해소됨, 2026-05-01) — compose Postgres default가
      #      `postgres`였고 다른 5곳은 `testuser`. 이번 sprint에 통일.
      #   3. vite build OOM — container memory 4GB에서 vite v6 production
      #      build가 SIGKILL. 빌드 자체가 비대해진 회귀.
      # 재개 조건 (모두 충족 시 `skip: false` 또는 블록 제거):
      #   - 이미지 freshness check가 wrapper에 들어감 (git-rev label 비교
      #     → 자동 rebuild)
      #   - vite build memory footprint 회귀 원인 식별 + 해결 (4GB 안에서
      #     안정적으로 끝나야 함)
      #   - 누락된 12개 commit과 함께 e2e 13개 spec이 그린
      # 위험은 RISKS.md에 active로 등록.
      skip: true
      tags: test e2e
      run: bash scripts/e2e-pre-push.sh

commit-msg:
  commands:
    conventional:
      run: |
        MSG=$(cat {1})
        if ! echo "$MSG" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .{1,100}"; then
          echo "ERROR: Conventional Commits 형식이어야 합니다:"
          echo "  type(scope): description"
          echo "  Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
          echo "  Example: feat(connection): add connection test button"
          exit 1
        fi
